name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout your repository
              uses: actions/checkout@v4

            - name: Install, build, and upload your site
              uses: withastro/action@v3
              with:
                  path: ./site
                  node-version: "22"
              env:
                  # Not secrets — the projectId/dataset are already embedded in the
                  # public client bundle regardless. No .env file exists in CI (it's
                  # gitignored), so these must be set here or the build queries Sanity
                  # with an undefined project.
                  PUBLIC_SANITY_PROJECT_ID: "9izf3au6"
                  PUBLIC_SANITY_DATASET: "production"

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
